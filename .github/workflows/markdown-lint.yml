name: Markdown lint

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".markdownlint.json"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.mdx"

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.43.0

      - name: Run markdownlint
        run: markdownlint "docs/**/*.md" "*.md" --config .markdownlint.json
