name: Vérification des liens

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "*.md"
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Lychee link checker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 7d
            --exclude-mail
            --accept 200,201,202,203,204,206,301,302,303,304,307,308,403,429
            './**/*.md'
            './**/*.mdx'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
